<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Artículo - Mi Espacio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #1a0033;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-color: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-color);
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 800px;
            position: relative;
        }

        .back-link {
            position: absolute;
            top: -40px;
            left: 0;
            text-decoration: none;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0.7;
            transition: opacity 0.3s;
        }

        .back-link:hover {
            opacity: 1;
        }

        h2 {
            font-size: 2.2rem;
            margin-bottom: 30px;
            font-weight: 300;
        }

        .form-group {
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .glass-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 15px;
            font-size: 1.1rem;
            outline: none;
            transition: background 0.3s, border-color 0.3s;
        }

        .glass-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .glass-input:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.4);
        }

        textarea.glass-input {
            resize: vertical;
            min-height: 200px;
        }

        .btn-subir {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 12px 30px;
            color: var(--text-color);
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 10px;
        }

        .btn-subir:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Volver</a>
        <h2>Nuevo Artículo</h2>
        
        <form action="#" method="POST" onsubmit="event.preventDefault(); alert('Artículo guardado (simulación)'); window.location.href='index.html';">
            <div class="form-group">
                <input type="text" class="glass-input" placeholder="Título del artículo" required>
            </div>
            
            <div class="form-group">
                <textarea class="glass-input" placeholder="Escribe tu artículo aquí..." required></textarea>
            </div>
            
            <button type="submit" class="btn-subir">
                <i class="fas fa-paper-plane"></i> Publicar
            </button>
        </form>
    </div>

</body>
</html>
