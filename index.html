<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equilibra - Micro Herramientas</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Barra de navegación -->
    <header class="navbar">
        <div class="logo">Equilibra</div>
        <nav>
            <ul class="nav-links">
                <li><button class="nav-btn">Inicio</button></li>
                <li><button class="nav-btn">Catálogo</button></li>
                <li><button class="nav-btn">Suscripción</button></li>
                <li><button class="nav-btn">Contacto</button></li>
                <li><button class="nav-btn primary-btn">Iniciar sesión</button></li>
            </ul>
        </nav>
    </header>

    <!-- Sección principal (Hero) -->
    <main class="hero">
        <h1 class="hero-title">¡Bienvenidos a Equilibra!</h1>
        <div class="hero-actions">
            <button class="action-btn">Explorar Catálogo</button>
            <button class="action-btn outline-btn">Explorar Suscripción</button>
        </div>
    </main>
</body>
</html>
