<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Espacio</title>
    <!-- Cargamos FontAwesome para los íconos blancos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Sidebar de Navegación -->
    <nav class="sidebar">
        <a href="#inicio" title="Inicio"><i class="fas fa-home"></i></a>
        <a href="#habilidades" title="Habilidades"><i class="fas fa-bolt"></i></a>
        <a href="#idiomas" title="Idiomas"><i class="fas fa-comment-dots"></i></a>
        <a href="#proyectos" title="Proyectos"><i class="fab fa-github"></i></a>
        <a href="#blog" title="Blog"><i class="fas fa-info-circle"></i></a>
    </nav>

    <main>
        <!-- Sección Inicio -->
        <section id="inicio">
            <div class="home-content">
                <h1>¡Bienvenidos a mi espacio!</h1>
                <div class="photo-frame">
                    <img src="assets/photo.jpg" alt="Mi foto">
                </div>
            </div>
        </section>

        <!-- Sección Habilidades -->
        <section id="habilidades">
            <h2>Habilidades</h2>
            <div class="skills-grid">
                <div class="glass-card skill-card">
                    <i class="fab fa-html5"></i>
                    <span>HTML5</span>
                </div>
                <div class="glass-card skill-card">
                    <i class="fab fa-css3-alt"></i>
                    <span>CSS3</span>
                </div>
                <div class="glass-card skill-card">
                    <i class="fab fa-js"></i>
                    <span>JavaScript</span>
                </div>
                <div class="glass-card skill-card">
                    <i class="fab fa-python"></i>
                    <span>Python</span>
                </div>
            </div>
        </section>

        <!-- Sección Idiomas -->
        <section id="idiomas">
            <h2>Idiomas</h2>
            <div class="langs-grid">
                <!-- Inglés: A1, A2, B1, B2 -->
                <div class="glass-card lang-card">
                    <h3>Inglés</h3>
                    <div class="cefr-levels">
                        <div class="level-dash active"></div>
                        <div class="level-dash active"></div>
                        <div class="level-dash active"></div>
                        <div class="level-dash active"></div>
                        <div class="level-dash"></div>
                        <div class="level-dash"></div>
                    </div>
                </div>
                <!-- Italiano: A1, A2 -->
                <div class="glass-card lang-card">
                    <h3>Italiano</h3>
                    <div class="cefr-levels">
                        <div class="level-dash active"></div>
                        <div class="level-dash active"></div>
                        <div class="level-dash"></div>
                        <div class="level-dash"></div>
                        <div class="level-dash"></div>
                        <div class="level-dash"></div>
                    </div>
                </div>
                <!-- Plantilla para el resto (solo A1) -->
                <!-- Francés, Portugués, Alemán, Neerlandés, Noruego, Sueco, Danés, Polaco, Checo, Rumano, Ruso -->
                <script>
                    const idiomasA1 = ['Francés', 'Portugués', 'Alemán', 'Neerlandés', 'Noruego', 'Sueco', 'Danés', 'Polaco', 'Checo', 'Rumano', 'Ruso'];
                    idiomasA1.forEach(idioma => {
                        document.write(`
                        <div class="glass-card lang-card">
                            <h3>${idioma}</h3>
                            <div class="cefr-levels">
                                <div class="level-dash active"></div>
                                <div class="level-dash"></div>
                                <div class="level-dash"></div>
                                <div class="level-dash"></div>
                                <div class="level-dash"></div>
                                <div class="level-dash"></div>
                            </div>
                        </div>
                        `);
                    });
                </script>
            </div>
        </section>

        <!-- Sección Proyectos -->
        <section id="proyectos">
            <h2>Próximamente más proyectos.</h2>
        </section>

        <!-- Sección Blog -->
        <section id="blog">
            <div class="blog-header">
                <h2>Blog</h2>
                <a href="nuevo-articulo.html" class="btn-subir">
                    <i class="fas fa-plus"></i> Subir
                </a>
            </div>
        </section>
    </main>

    <!-- Script para scroll suave al hacer clic en la sidebar -->
    <script>
        document.querySelectorAll('.sidebar a').forEach(anchor => {
            anchor.addEventListener('click', function(e) {
                e.preventDefault();
                const targetId = this.getAttribute('href').substring(1);
                const targetSection = document.getElementById(targetId);
                targetSection.scrollIntoView({ behavior: 'smooth' });
            });
        });
    </script>
</body>
</html>
